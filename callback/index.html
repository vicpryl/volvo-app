<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OAuth Callback</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 4em auto; padding: 0 1em; }
    code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; word-break: break-all; }
    .box { background: #f9f9f9; border: 1px solid #ddd; padding: 1em; border-radius: 4px; margin: 1em 0; }
  </style>
</head>
<body>
  <h1>OAuth Callback</h1>
  <p>This page is the OAuth 2.0 redirect endpoint for the XC90_Telemetry_Logger application.</p>
  <div class="box">
    <p><strong>Authorization code:</strong></p>
    <code id="code">—</code>
    <p style="margin-top:1em"><strong>State:</strong> <code id="state">—</code></p>
  </div>
  <p>Copy the authorization code and paste it into the terminal to exchange it for an access token.</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('code').textContent  = params.get('code')  || '(not present)';
    document.getElementById('state').textContent = params.get('state') || '(not present)';
  </script>
</body>
</html>
